name: Deploy to server (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    env:
      # postinstall (prisma generate) требует DATABASE_URL при CI=true; к БД не подключается
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          script: bash /opt/kpd/app/deploy/server-deploy.sh
